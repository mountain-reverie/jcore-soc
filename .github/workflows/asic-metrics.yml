name: asic-metrics
# GF180 J4+MMU ASIC target: per-PR RTL hard gate + synth-only (no place &
# route, no LibreLane) metrics for the dashboard. Plans 3-5 (LibreLane
# hierarchical hardening, Verilator gate-level boot sign-off, tape-out) are
# explicitly out of scope here -- see .superpowers/sdd/task-5-brief.md.
on: [pull_request, push]

jobs:
  # Fast hard gate: regenerate the gf180_j4mmu SoC and run the RTL boot sim +
  # jcore-cpu MMU translation cosim guard. Must report red quickly on a real
  # regression, so it is kept separate from (and does not wait on) the slower
  # PDK-dependent synth-metrics job below.
  rtl-sim:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: RTL boot + MMU translation cosim guard (hard gate)
        # sim/rtl.sh --mmu regenerates the SoC via soc_gen itself and builds a
        # real boot image; it transiently dirties components/cpu (MMU decoder
        # overlay, restored on exit) and regenerates the placeholder
        # boot_image_pkg.vhd on disk -- this is expected and NOT a failure,
        # so no "git diff --exit-code" clean-tree assertion is added here.
        run: targets/asic/gf180_j4mmu/sim/rtl.sh --mmu

  # NOTE: the GF180 synth-only per-macro metrics job used to live here, but
  # (a) it could not pass on a fresh clone (final-review C1: it never ran the
  # decode-generate + v2p source prep that sim/rtl.sh does) and (b) it only
  # upload-artifact'd, never reaching the mountain-reverie.github.io/jcore-soc
  # dashboard (that pipeline is fed exclusively by board-synth.yml's
  # benchmark/deploy-pages jobs). Both are fixed by moving the GF180 synth
  # leg into board-synth.yml's `gf180-synth-metrics` job (uses the new
  # targets/asic/gf180_j4mmu/prep_sources.sh for the C1 fix, and publishes
  # canonical metrics-gf180.json into the benchmark job's `needs:`). This
  # workflow stays RTL-gate-only.
