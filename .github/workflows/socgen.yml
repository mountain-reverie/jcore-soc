name: socgen
on:
  push:
    paths: ['tools/socgen/**', '.github/workflows/socgen.yml']
  pull_request:
    paths: ['tools/socgen/**', '.github/workflows/socgen.yml']
  workflow_dispatch:
jobs:
  vhdl-frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Check out corpus submodules
        # The round-trip corpus reads VHDL from two submodules
        # (components/cpu, components/gps_if2). Init just those rather than
        # submodules: recursive, so we fetch only what the test needs.
        run: git submodule update --init components/cpu components/gps_if2
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install ghdl (for round-trip re-analysis)
        run: sudo apt-get update && sudo apt-get install -y ghdl
      - name: Build + vet
        run: |
          cd tools/socgen
          go build ./...
          go vet ./...
      - name: Test (tight timeout)
        # GitHub runners are isolated, so a -timeout is the needed guard here; a
        # runaway just fails the job rather than the dev's machine.
        #
        # -p 1 is REQUIRED: the board and elaborate integration tests each shell out
        # to `make mimas_v2` into the same output/mimas_v2 dir. Run in parallel (the
        # default), they race on Makefile.tmp ("mv: cannot stat ... Makefile.tmp").
        # Serializing test binaries with -p 1 matches the local Makefile test target.
        env:
          JCORE_SOC_ROOT: ${{ github.workspace }}
        run: |
          cd tools/socgen
          timeout -s KILL 150 go test ./... -timeout 90s -count=1 -p 1
