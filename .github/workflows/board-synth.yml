name: board-synth
on:
  # No path filters: the jobs below (sim/bitstream/benchmark/metrics-tests) are
  # required status checks in the branch ruleset. Path-filtering them means a PR
  # that doesn't touch the filtered paths (e.g. tools/socgen — which generates
  # the VHDL — or docs/boot) never reports those contexts and can never merge.
  # Run on every push to main/master and every PR so the required checks always
  # report a conclusion.
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  metrics-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Unit-test the metrics scripts
        run: python3 -m unittest discover -s tools/fpga/tests -v

  sim:
    needs: metrics-tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    strategy:
      fail-fast: false
      matrix:
        # Single-core baselines (j2-direct, j4-rom) + dual-core functional SMP
        # (j2-dual, j4-dual). sim.sh sets EXPECT_SMP for the *-dual
        # variants, so their tb additionally requires cpu1's "CPU1 OK" mailbox
        # report to pass.
        include:
          - { board: ulx3s, variant: j2-direct }
          - { board: ulx3s, variant: j2-dual }
          - { board: ulx3s, variant: j4-rom }
          - { board: ulx3s, variant: j4-dual }
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # socgen (Go) regenerates the SoC via make soc_gen inside sim.sh;
      # the container ships ghdl + cpu sim toolchain but not Go, so install it.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Board testbenches
        run: VARIANT=${{ matrix.variant }} ./targets/boards/${{ matrix.board }}/sim.sh

  bitstream:
    needs: sim
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    # j2-direct is the production config and hard-gates timing; j4-rom is an
    # experimental variant whose metrics we want to TRACK even if it misses the
    # timing gate, so it is non-fatal (continue-on-error).
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false   # variants are independent; one failing must not cancel the other's metrics
      matrix:
        include:
          - { board: ulx3s, variant: j2-direct, experimental: false }
          - { board: ulx3s, variant: j4-rom,   experimental: true }
          - { board: ulx3s, variant: j2-dual, experimental: true }
          - { board: ulx3s, variant: j4-dual,   experimental: true }
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # socgen (Go) regenerates cpus_config.vhd + cpu_synth_files.list for the
      # selected variant; synth.sh copies them verbatim (gen_synth_sources.sh),
      # so this step is required to ensure j4-rom synthesizes its own SoC and
      # not the committed j2-direct default.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Regenerate SoC for variant
        run: |
          # The checkout runs as a different user than the container, so git
          # refuses repo ops ("dubious ownership"); allow them. This also lets
          # synth.sh's `git rev-parse` stamp a real commit into the metrics.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          make ${{ matrix.board }} TARGET=soc_gen VARIANT=${{ matrix.variant }}
      - name: Build bitstream + metrics (gates timing)
        run: VARIANT=${{ matrix.variant }} ./targets/boards/${{ matrix.board }}/synth.sh
      - name: Upload bitstream
        if: always()   # the timing gate may exit nonzero after producing the .bit
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.board }}-${{ matrix.variant }}-bitstream
          path: targets/boards/${{ matrix.board }}/build/${{ matrix.board }}.bit
          if-no-files-found: ignore
      - name: Upload metrics
        if: always()   # synth.sh writes metrics.json before the timing gate exits
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.board }}-${{ matrix.variant }}
          path: targets/boards/${{ matrix.board }}/build/metrics.json
          if-no-files-found: error
      - name: Upload P&R logs
        if: always()   # keep the placer/router logs even on a timing-gate miss
        uses: actions/upload-artifact@v4
        with:
          # The nextpnr log carries the binding critical path (source -> sink,
          # logic/routing split); metrics.json now summarises it, but the raw
          # log is needed to read the full path without scraping CI job logs.
          name: pnr-logs-${{ matrix.board }}-${{ matrix.variant }}
          path: |
            targets/boards/${{ matrix.board }}/build/nextpnr.log
            targets/boards/${{ matrix.board }}/build/yosys.log
          if-no-files-found: ignore

  bitstream-icesugar:
    needs: sim
    runs-on: ubuntu-latest
    # The iCESugar J1 now fits the UP5K; synth.sh runs a fit+timing gate, so this
    # job FAILS on a regression (over-budget or timing miss). Metrics still upload
    # via if:always below, so a regression is charted before the job fails.
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # socgen (Go) regenerates the SoC + icesugar.pcf via make soc_gen inside
      # synth.sh; the container ships ghdl but not Go, so install it.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Synth (yosys-stat metrics even if nextpnr cannot place)
        run: ./targets/boards/icesugar/synth.sh
      - name: Upload metrics
        if: always()   # synth.sh exits nonzero on the fit failure, but wrote metrics.json
        uses: actions/upload-artifact@v4
        with:
          name: metrics-icesugar-j1
          path: targets/boards/icesugar/build/metrics.json
          if-no-files-found: error
      - name: Upload bitstream (only if it placed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: icesugar-j1-bitstream
          path: targets/boards/icesugar/build/icesugar.bin
          if-no-files-found: ignore

  gf180-synth-metrics:
    # GF180 ASIC target: synth-only (yosys generic synth -> gf180mcu Liberty
    # -> stat, NO place & route) per-macro metrics, folded into this
    # workflow's benchmark/deploy-pages pipeline so they actually reach
    # mountain-reverie.github.io/jcore-soc (the standalone asic-metrics.yml
    # job this replaced only ever upload-artifact'd -- see that workflow's
    # NOTE). Independent of the sim/ bitstream/ bitstream-icesugar jobs
    # above (no `needs:`); the RTL hard gate lives in asic-metrics.yml's
    # rtl-sim job, which is a separate required check.
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/jcore-cpu-ci:latest
    env:
      PDK_PIN: f6eeac7dad085ffcc829ccfd721f7b4ce39edcf7
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache GF180 PDK (ciel)
        # The PDK is multi-GB; cache it keyed on the pin so a run only
        # re-downloads when the pin changes.
        uses: actions/cache@v4
        with:
          path: ~/.ciel
          key: gf180mcu-pdk-${{ env.PDK_PIN }}

      - name: Toolchain deps not in the container (pip, ciel, pytest)
        # yosys-ghdl + Go (socgen) already ship in the jcore-cpu-ci container
        # (Ubuntu 24.04, root), but pip/ensurepip do NOT -- bootstrap pip via
        # apt, then pip-install ciel (PDK manager) + pytest. --break-system-packages
        # is required under PEP 668 (Ubuntu marks the system env externally-managed).
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends python3-pip
          python3 -m pip install --quiet --break-system-packages ciel pytest

      - name: Fetch GF180 PDK (pinned)
        run: ciel enable --pdk-family gf180mcu "$PDK_PIN"

      - name: Test the metrics emitter
        run: python3 -m pytest tools/asic/

      - name: Regenerate SoC + shared v2p'd sources (final-review C1 fix)
        # Fresh-clone prep shared with sim/rtl.sh (decode generate + v2p
        # loop) -- without this, gen_synth_sources.sh/filelist.sh abort deep
        # inside synth_gf180.sh on missing generated VHDL.
        run: targets/asic/gf180_j4mmu/prep_sources.sh

      - name: Per-macro GF180 synth-only stats
        run: |
          export GF180_LIB="$(find "$HOME/.ciel" -name 'gf180mcu_fd_sc_mcu7t5v0__tt_025C_5v00.lib' | head -1)"
          targets/asic/gf180_j4mmu/metrics/synth_gf180.sh

      - name: Emit canonical metrics-gf180.json
        run: |
          mkdir -p metrics-gf180
          python3 tools/asic/emit_gf180_metrics.py \
            j4_core=targets/asic/gf180_j4mmu/build/j4_core.stat.txt \
            cache_ctrl.icache=targets/asic/gf180_j4mmu/build/cache_ctrl.icache.stat.txt \
            cache_ctrl.dcache=targets/asic/gf180_j4mmu/build/cache_ctrl.dcache.stat.txt \
            cache_tag=targets/asic/gf180_j4mmu/build/cache_tag.stat.txt \
            cache_data=targets/asic/gf180_j4mmu/build/cache_data.stat.txt \
            soc_cluster.devices=targets/asic/gf180_j4mmu/build/soc_cluster.devices.stat.txt \
            soc_cluster.sdram_ctrl=targets/asic/gf180_j4mmu/build/soc_cluster.sdram_ctrl.stat.txt \
            top=targets/asic/gf180_j4mmu/build/top.stat.txt \
            --commit "${{ github.sha }}" \
            --out metrics-gf180/metrics-gf180.json

      - uses: actions/upload-artifact@v4
        with:
          # name MUST match the `metrics-*` glob the benchmark job's
          # download-artifact step consumes.
          name: metrics-gf180
          path: metrics-gf180/metrics-gf180.json

  benchmark:
    needs: [bitstream, bitstream-icesugar, gf180-synth-metrics]
    # Chart whatever metrics were produced. Synth legs that miss their gate
    # (j4-rom timing, iCESugar UP5K fit) are non-fatal and still upload metrics
    # via `if: always()`, so run regardless of any leg's pass/fail; the
    # empty-array guard below covers the genuinely-no-artifacts case.
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      # download-artifact@v4 with pattern exits 0 (downloads nothing) when no
      # artifact matches, so the true first-run case needs no continue-on-error;
      # a real download failure (permissions/network) should surface, not chart
      # an empty run. The empty-array guard in the next step covers no-artifacts.
      - name: Download all board metrics
        uses: actions/download-artifact@v4
        with:
          pattern: metrics-*
          path: metrics-in
      - name: Build action inputs
        run: |
          set -euo pipefail
          mkdir -p site/bench-size site/bench-speed metrics-in
          shopt -s nullglob globstar
          inputs=(metrics-in/**/*.json)
          if [ ${#inputs[@]} -eq 0 ]; then
            echo "WARN: no metric artifacts found — emitting empty suites" >&2
            echo "[]" > build-size.json; echo "[]" > build-speed.json
          else
            python3 tools/fpga/to_gha_bench.py "${inputs[@]}" \
              --size-out build-size.json --speed-out build-speed.json
          fi
          ls -l build-size.json build-speed.json
      - name: Bootstrap prior history from the live site
        run: |
          set -euo pipefail
          base="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}"
          for kind in size speed; do
            url="$base/bench-$kind/benchmark-data.json"
            if curl -fsSL "$url" -o "site/bench-$kind/benchmark-data.json" 2>/dev/null; then
              echo "fetched prior $kind history"
            else
              : > "site/bench-$kind/benchmark-data.json"
              echo "no prior $kind history (first run)"
            fi
          done
      - name: Append size suite
        uses: benchmark-action/github-action-benchmark@v1
        continue-on-error: true
        with:
          name: synth-size
          tool: customSmallerIsBetter
          output-file-path: build-size.json
          external-data-json-path: site/bench-size/benchmark-data.json
          benchmark-data-dir-path: site/bench-size
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          auto-push: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Append speed suite
        uses: benchmark-action/github-action-benchmark@v1
        continue-on-error: true
        with:
          name: synth-speed
          tool: customBiggerIsBetter
          output-file-path: build-speed.json
          external-data-json-path: site/bench-speed/benchmark-data.json
          benchmark-data-dir-path: site/bench-speed
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          auto-push: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Assemble site
        run: |
          set -euo pipefail
          for kind in size speed; do
            f="site/bench-$kind/benchmark-data.json"
            if [ ! -s "$f" ]; then
              echo '{"lastUpdate":0,"repoUrl":"","entries":{}}' > "$f"
            fi
            echo "window.BENCHMARK_DATA = $(cat "$f")" > "site/bench-$kind/data.js"
          done
          cp tools/fpga/dashboard/index.html tools/fpga/dashboard/app.js site/
          mkdir -p site/fixtures && cp tools/fpga/dashboard/fixtures/data.js site/fixtures/
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: benchmark
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
