name: build-toolchain-image

# Build + publish the sh2eb-linux-muslfdpic J-core Linux cross-toolchain image
# (fork binutils + pinned stock gcc 13.3.0 + musl, via musl-cross-make) used by
# other jcore Actions (SP3-a vmlinux build, and eligible SP1/SP2 jobs).
# Cold build ~45-90 min (from-source binutils + 2-stage gcc + musl).
#
# Tag policy:
#   latest                   (always overwritten)
#   sha-<full-40-char-sha>   (immutable, for rollback)
on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - '.github/ci/toolchain/**'
      - '.github/workflows/build-toolchain-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build + push ghcr.io toolchain image
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .github/ci/toolchain
          file: .github/ci/toolchain/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/jcore-linux-toolchain:latest
            ghcr.io/${{ steps.owner.outputs.name }}/jcore-linux-toolchain:sha-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.owner.outputs.name }}/jcore-linux-toolchain:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.owner.outputs.name }}/jcore-linux-toolchain:buildcache,mode=max

      - name: Smoke test (compile/link + J-core opcode)
        run: |
          IMG=ghcr.io/${{ steps.owner.outputs.name }}/jcore-linux-toolchain:sha-${{ github.sha }}
          docker pull "$IMG"
          docker run --rm -v "$PWD/.github/ci/toolchain/smoke.sh:/smoke.sh:ro" "$IMG" sh /smoke.sh

      - name: vmlinux proof (full j2 kernel link)
        run: |
          IMG=ghcr.io/${{ steps.owner.outputs.name }}/jcore-linux-toolchain:sha-${{ github.sha }}
          # linux `jcore` branch carries the CONFIG_CPU_SH2 nstree.o -fno-inline
          # gcc-ICE workaround; the image's fork binutils carries the arch-merge fix.
          git clone --depth 1 -b jcore https://github.com/mountain-reverie/linux.git /tmp/linux
          docker run --rm -v /tmp/linux:/linux \
            -v "$PWD/.github/ci/toolchain/vmlinux-smoke.sh:/vmlinux-smoke.sh:ro" \
            "$IMG" sh -c 'LINUX=/linux sh /vmlinux-smoke.sh'
