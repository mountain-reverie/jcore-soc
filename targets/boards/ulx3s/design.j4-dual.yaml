# ULX3S DualJ4 variant (j4-dual): two j4-rom cores (two_cpu_m0 arch), id-cache.
# Asymmetric dual (mirrors the turtle board's per-core split): core0 binds the
# FPGA-optimised config (register file in ECP5 block RAM -> ~1.4k LUT4 + FFs
# reclaimed, less congestion), core1 keeps register_file(two_bank) to keep
# validating the portable / ASIC-representative register-file logic on FPGA.
#
# Everything the second core needs (cpu1 bus, aic1, icache1) lives in
# design.dual-common.yaml, which itself includes base.yaml. This variant only
# restates the `cpu:` block.
<<: !include design.dual-common.yaml
cpu:
  architecture: two_cpu_m0
  cores: 2
  model: j4
  decode: rom
  copro: false
  cache: id
  fpga-opt-core0: true
