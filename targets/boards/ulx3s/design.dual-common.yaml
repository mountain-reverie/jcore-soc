# ULX3S dual-core common layer: everything a second core needs on top of
# base.yaml, shared by both dual variants (j2-dual, j4-dual). Each variant
# includes THIS (which in turn includes base.yaml) and restates only its own
# `cpu:` block (model/decode + fpga-opt-core0).
#
# Merge behavior (confirmed from tools/socgen/design/include.go):
#   - MAP keys: deep-merge — nearer (including) doc wins; missing keys inherited.
#   - SEQUENCE keys: CONCATENATE — including doc's list first, base items appended.
#   - applyZeroSignals is lenient (no-op for already-driven signals), so base's
#     zero-signals list (icache1_ctrl, cpu1_event_i …) is inherited safely.
#
# Therefore, layered under a variant's `cpu:` block:
#   - peripheral-buses.cpu1: true overrides base's false (map deep-merge).
#   - devices: aic1 is added ahead of base's [gpio0,aic0,uart0,spi2] (list-concat).
#   - top-entities.ddr_ram_mux.ports.icache1_ctrl added via nested map merge.
#   - zero-signals NOT restated; base list inherited with applyZeroSignals leniency.
#   Single-core variants (j2-direct, j4-rom) include base.yaml directly, unchanged.
<<: !include base.yaml

peripheral-buses:
  cpu1: true

# Only aic1/ipi0 are new; base's gpio0/aic0/uart0/spi2 are appended by
# list-concat.
devices:
  - class: aic
    name: aic1
    base-addr: 0xabcd0500
    dt-node: false
    cpu: 1
    generics:
      c_busperiod: CFG_CLK_CPU_PERIOD_NS
      # index 3 -> vector 0x14, matching aic0/turtle (index 3 is free; the
      # ipi device below targets irq:3 on each cpu).
      vector_numbers: '(x"11", x"12", x"13", x"14", x"15", x"16", x"17", x"18")'
    ports:
      bstb_i: 0
      back_i: 0
      enmi_i: 1
      event_i: cpu1_event_o
      event_o: cpu1_event_i

  # Cross-core IPI (reused icache_modereg, socgen 'ipi' class). dt-node:false
  # suppresses the bare soc-child node the generic ipi class would otherwise
  # emit; ipiNode2 still finds this device (class "ipi") and emits the
  # correct ROOT-level "ipi" node (device_tree.clj to-dt parity, matching
  # mimas_v2/turtle's cache_ctrl-carried ipi-info). int1->irqs1(3) auto-wires
  # to aic1 (no explicit irq_i there). int0 is NOT put on the irq map: aic0 has
  # a board-owned irq_i (aic_irq, from aic_irq_gen), so it cannot consume the
  # devices-scope irqs0 vector. Instead int0 drives a plain scalar (ipi0_int0)
  # that socgen crosses devices->soc as a device-output port (the same crossing
  # aic_irq uses, reversed); the soc-level aic_irq_combine ORs it into aic_irq.
  # The DT ipi-node vector (0x14) still comes from int1's irq:3.
  - class: ipi
    name: ipi0
    base-addr: 0xabcd00c0
    dt-node: false
    ports:
      int0: ipi0_int0
    irq:
      int1: { cpu: 1, irq: 3 }

# Enable icache1 via nested map deep-merge into ddr_ram_mux.ports. Also
# retarget aic_irq_gen's output to aic_irq_ext (dual-only rename) and add the
# aic_irq_combine top-entity that ORs it with ipi0's int0 (the ipi0_int0 scalar
# socgen crosses devices->soc) back onto the "aic_irq" signal aic0.irq_i already
# consumes. base.yaml (shared with j2-direct/j4-rom) is left untouched, so those
# variants stay byte-identical: aic_irq_gen.irq -> aic_irq direct, no combiner.
top-entities:
  ddr_ram_mux:
    ports:
      icache1_ctrl: CACHE_CTRL_ON

  aic_irq_gen:
    ports:
      irq: aic_irq_ext

  aic_irq_combine:
    entity: aic_irq_combine
    ports:
      ext_i: aic_irq_ext
      ipi_i: ipi0_int0
      combined_o: aic_irq
