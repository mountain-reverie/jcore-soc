target: ice40
plugins: !include ../default_plugins.yaml
device-classes: !include ../common_device_classes.yaml

top-entities:
  cpus:
    ports:
      cpu0_copro_i: NULL_COPR_I
      cpu1_copro_i: NULL_COPR_I
      cpu1eni: 0
    generics:
      INSERT_WRITE_DELAY_BOOT_MEM: false
      INSERT_READ_DELAY_BOOT_MEM: false
      INSERT_INST_DELAY_BOOT_MEM: false

padring-entities:
  # iCESugar 12 MHz passthrough clock + power-on reset. Outputs drive the SoC
  # clock net (clk_sys) and reset net (reset) so soc_gen exposes them as soc
  # ports and pad_ring wires clkgen -> soc.
  clkgen:
    entity: ice_clkgen
    ports: { clk_in: clk, clk_out: clk_sys, rst_out: reset }

cpu:
  architecture: one_cpu_ebr
  cores: 1
  model: j1
  decode: rom
  copro: false
  cache: none

devices:
  - class: uartlite
    name: uart0
    base-addr: 0xabcd0100
    ports: { rx: uart0_rx, tx: uart0_tx }
    generics: { rx_fifo_len: 2, tx_fifo_len: 2 }
  - class: gpio2
    name: gpio0
    base-addr: 0xabcd0000
    # 8-bit bank (3 RGB LEDs) instead of the full 32-bit one to fit the up5k.
    generics: { width: 8 }
    ports: { d_o: gpio_do, d_i: gpio_di }

system:
  data-bus-decode: exact

pins:
  file: ../pins/icesugar.pins
  type: pin-names
  rules:
    - { match: ".*", attrs: { iostandard: LVCMOS33 } }
    - { match: clk, signal: true, buff: false }
    - { match: ser_rx, signal: uart0_rx }
    - { match: ser_tx, signal: uart0_tx }
    - { match: ledr_n, out: { name: "gpio_do(0)", invert: true } }
    - { match: ledg_n, out: { name: "gpio_do(1)", invert: true } }
    - { match: ledb_n, out: { name: "gpio_do(2)", invert: true } }
