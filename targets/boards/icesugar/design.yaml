target: ice40
plugins: !include ../default_plugins.yaml
device-classes: !include ../common_device_classes.yaml

top-entities:
  cpus:
    ports:
      cpu0_copro_i: NULL_COPR_I
      cpu1_copro_i: NULL_COPR_I
      cpu1eni: 0
    generics:
      INSERT_WRITE_DELAY_BOOT_MEM: false
      INSERT_READ_DELAY_BOOT_MEM: false
      INSERT_INST_DELAY_BOOT_MEM: false

padring-entities:
  # iCESugar 12 MHz passthrough clock + power-on reset. Outputs drive the SoC
  # clock net (clk_sys) and reset net (reset) so soc_gen exposes them as soc
  # ports and pad_ring wires clkgen -> soc.
  clkgen:
    entity: ice_clkgen
    ports: { clk_in: clk, clk_out: clk_sys, clk_eth: clk_eth, rst_out: reset }

cpu:
  architecture: one_cpu_ebr
  cores: 1
  model: j1
  decode: rom
  mult: dsp
  copro: false
  cache: none

devices:
  - class: uartlite
    name: uart0
    base-addr: 0xabcd0100
    ports: { rx: uart0_rx, tx: uart0_tx }
    # rx_enable=false: iCESugar's rom/banner.c only ever writes the UART
    # (UART_DATA + TX_FULL poll) and its irq is unconnected (irq => open in
    # devices.vhd) -- the RX FIFO/shifter/baud-rx and RX/timeout interrupt
    # logic are dead weight here, so drop them to reclaim LCs on the up5k.
    generics: { rx_fifo_len: 1, tx_fifo_len: 1, rx_enable: false }
  - class: gpio2
    name: gpio0
    base-addr: 0xabcd0000
    # 3-bit bank: only the 3 RGB LEDs (ledr/ledg/ledb) are wired to gpio_do(2:0)
    # in pad_ring.vhd and only bit0 is used by rom/banner.c; d_i is unconnected.
    # Shrinking from the full 32-bit bank to 3 bits trims the unused
    # register/mux/toggle/set/clear datapath lanes to reclaim LCs on the up5k.
    generics: { width: 3 }
    ports: { d_o: gpio_do, d_i: gpio_di }
  # W5500 Ethernet controller (WIZ850io PMOD) driven over SPI. Replaces the
  # PHY-less 10BASE-T eth: the W5500 does PHY+MAC+TCP/IP in silicon; the J1
  # drives its registers via this spi master. num_cs=1 (single W5500).
  - class: spi
    name: eth
    base-addr: 0xabcd1000
    # spi2 requires NUM_CS in 2..5; the W5500 uses only cs(0), cs(1) is unused.
    generics: { num_cs: 2 }

# Single J1 master: drop cpu1's peripheral bus so socgen connects the one master
# directly (no multi_master_bus_mux) — saves LCs on the UP5K.
peripheral-buses:
  cpu1: false

system:
  data-bus-decode: exact

pins:
  file: ../pins/icesugar.pins
  type: pin-names
  rules:
    - { match: ".*", attrs: { iostandard: LVCMOS33 } }
    - { match: clk, signal: true, buff: false }
    - { match: ser_rx, signal: uart0_rx }
    - { match: ser_tx, signal: uart0_tx }
    - { match: ledr_n, out: { name: "gpio_do(0)", invert: true } }
    - { match: ledg_n, out: { name: "gpio_do(1)", invert: true } }
    - { match: ledb_n, out: { name: "gpio_do(2)", invert: true } }
    # W5500 SPI (WIZ850io PMOD) -- pin numbers to confirm vs iCESugar PMOD schematic.
    - { match: w5500_sclk, signal: eth_clk }
    - { match: w5500_mosi, signal: eth_mosi }
    - { match: w5500_miso, signal: eth_miso }
    - { match: w5500_cs, signal: "eth_cs(0)" }
