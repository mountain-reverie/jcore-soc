# gf180_j4mmu FLASH variant: attaches the qspi_flash_ctrl burst-capable QSPI
# NOR flash controller (components/misc/qspi_flash_ctrl.vhd, Task 1 of the
# QSPI XIP sub-project) as a MEM-BUS target on ddr_bus, via
# components/misc/mem_region_mux.vhd (Task 2), on top of base.yaml. Opt-in
# only (select with VARIANT=flash); base.yaml itself stays flash-less so the
# default gf180_j4mmu build is unchanged.
#
# Supersedes SP2's peripheral-bus attach (qspi_flash device on the 0xA
# peripheral bus, one word at a time via devices.vhd). That does not give
# cache-line burst refills / execute-in-place; this Task 2 attach does:
# ddr_ram_mux's ddr_bus (cached CPU mem-bus, feeds icache/dcache refills) now
# fans out through mem_region_mux to {sdram_ctrl, qspi_flash_ctrl} by address
# region, so flash-region refills stream from flash and everything else goes
# to SDRAM as before.
#
# Region: 0x14000000-0x14FFFFFF (16 MiB) -- Task 3 (jcore-soc QSPI XIP
# sub-project) CHANGED this from SP2/Task 2's 0xA1000000. Reason: the flash
# region must be *fetchable* -- reachable by an instruction fetch, not just a
# data access. targets/cpu_core_pkg.vhd's decode_core_instr_addr()/
# decode_core_data_addr() hard-code the top address nibble: addr[31:28]=0x0
# -> DEV_SRAM (boot ROM), addr[31:28]=0x1 -> DEV_DDR (the cached bus this
# mux sits behind), addr[31:28]=0xA -> DEV_PERIPH/DEV_CPU, anything else ->
# DEV_NONE (unmapped -- fetch never even reaches ddr_ram_mux/icache/this
# mux). 0xA1000000 has top nibble 0xA, so it decoded to DEV_PERIPH at the
# CPU-core level and was UNREACHABLE via ddr_bus/this mux at all (it was a
# leftover from when flash was an 0xA peripheral-bus device, Task 2 carried
# it forward without re-checking that constraint once the attach became a
# ddr_bus top-entity target instead). 0x14000000 has top nibble 0x1, so it
# decodes to DEV_DDR like SDRAM and is a fetchable address.
#
# Non-aliasing under icache PA[27:13]: components/cpu/cache/icache_ram.vhd's
# tag stores PA[27:13] only (a 28-bit region, PA[31:28] dropped from the tag
# because it is always 0x1 for anything reaching the icache -- only DEV_DDR
# addresses are ever cached). SDRAM occupies PA[27:0] = 0x0000000-0x1FFFFFF
# (dram: [0x10000000, 0x2000000] in base.yaml/design.yaml, i.e. 32 MiB at
# PA[31:0]=0x10000000). Flash at 0x14000000 has PA[27:0] = 0x4000000-
# 0x4FFFFFF, entirely disjoint from SDRAM's PA[27:0] range, so the 16 MiB
# flash window cannot alias the 32 MiB SDRAM window in the icache's 28-bit
# tag space. FLASH_MASK = x"FF000000" isolates the top 8 address bits for
# the region mux's decode ((req.a and FLASH_MASK) = (FLASH_BASE and
# FLASH_MASK)).
#
# FLASH_BASE generic (on qspi_flash_ctrl itself): must track the same
# 0x14000000 -- db_i.a (driven by mem_region_mux's flash_req, itself
# ddr_bus_o passed through untouched when addressed) is still the FULL,
# un-relocated address, so FLASH_BASE must equal mem_region_mux's flash_base
# for qspi_flash_ctrl's internal `in_range`/24-bit-offset decode to line up
# (mem_region_mux's own region decode already gates db_i.en off outside the
# flash region, so qspi_flash_ctrl's internal in_range check is
# redundant-but-harmless belt-and-braces, not load-bearing).
<<: !include base.yaml

top-entities:
  # sdram_ctrl no longer binds directly to ddr_bus_o/ddr_bus_i/ddr_bus_ack_r
  # (base.yaml) -- it now sits behind mem_region_mux on private
  # sdram_req/sdram_bst/sdram_resp/sdram_ack_r nets. clk/cmd/dq_o/dq_oe/dq_i
  # ports are inherited unchanged from base.yaml (deep-merge: only the
  # 4 overridden keys below are replaced).
  sdram_ctrl:
    ports:
      req: sdram_req
      bst: sdram_bst
      resp: sdram_resp
      ack_r: sdram_ack_r

  # the flash controller itself: a second mem-bus target, wired to its own
  # private flash_req/flash_bst/flash_resp/flash_ack_r nets (see
  # mem_region_mux below). Not a `devices:` entry any more (no ring-bus /
  # peripheral-bus decode -- direct mem-bus attach).
  qspi_flash_ctrl:
    ports:
      clk: clk_sys
      rst: reset
      db_i: flash_req
      bst: flash_bst
      db_o: flash_resp
      ack_r: flash_ack_r
      fl_cs_n: qfl_cs_n
      fl_sck: qfl_sck
      fl_io_o: qfl_io_o
      fl_io_oe: qfl_io_oe
      fl_io_i: qfl_io_i
    generics:
      lanes: 4
      dummy_cycles: 6
      flash_base: 'x"14000000"'

  # the region mux (components/misc/mem_region_mux.vhd, Task 2): sits
  # between ddr_ram_mux's ddr_bus (upstream) and {sdram_ctrl,
  # qspi_flash_ctrl} (downstream), decoding req.a to route cache-line
  # refills to flash for the flash region and sdram otherwise.
  mem_region_mux:
    ports:
      req: ddr_bus_o
      bst: ddr_burst
      resp: ddr_bus_i
      ack_r: ddr_bus_ack_r
      sdram_req: sdram_req
      sdram_bst: sdram_bst
      sdram_resp: sdram_resp
      sdram_ack_r: sdram_ack_r
      flash_req: flash_req
      flash_bst: flash_bst
      flash_resp: flash_resp
      flash_ack_r: flash_ack_r
    generics:
      flash_base: 'x"14000000"'
      flash_mask: 'x"FF000000"'

# devices: intentionally NOT overridden here -- omitting the key means the
# base.yaml devices list (gpio0/aic0/uart0/spi2) is inherited unmodified;
# SP2's `qspi_flash0` peripheral device is gone (this variant no longer
# declares it), which is exactly the "remove the SP2 periph device" step.

pins:
  file: ../pins/gf180_j4mmu.flash.pins
